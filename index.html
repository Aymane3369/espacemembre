<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paiement Stripe - Packs</title>

<script src="https://js.stripe.com/v3/"></script>

<style>
body { font-family: Arial; background:#f4f6fb; padding:20px; }
.container { max-width:800px; margin:auto; background:#fff; padding:20px; border-radius:12px; }

.pack { display:flex; justify-content:space-between; padding:12px; border:1px solid #ddd; margin-bottom:10px; border-radius:8px; }

button {
    background:#0f1a2e;
    color:white;
    border:none;
    padding:10px 16px;
    border-radius:8px;
    cursor:pointer;
}

button:hover { background:#1a2c4a; }

.cart { margin-top:20px; padding:10px; border-top:2px solid #eee; }
.total { font-weight:bold; margin-top:10px; }
</style>

</head>

<body>

<div class="container">

<h2>🛒 Packs disponibles</h2>

<div class="pack">
    <span>🥉 Bronze - 10€</span>
    <button onclick="add('bronze')">Ajouter</button>
</div>

<div class="pack">
    <span>🥈 Silver - 20€</span>
    <button onclick="add('silver')">Ajouter</button>
</div>

<div class="pack">
    <span>🥇 Gold - 30€</span>
    <button onclick="add('gold')">Ajouter</button>
</div>

<div class="cart">
    <h3>Panier</h3>
    <div id="cart"></div>
    <div class="total" id="total">Total : 0€</div>

    <button onclick="checkout()">💳 Payer avec Stripe</button>
</div>

</div>

<script>
const prices = {
    bronze: 10,
    silver: 20,
    gold: 30
};

let cart = [];

function add(item) {
    if (!cart.includes(item)) cart.push(item);
    render();
}

function render() {
    const cartDiv = document.getElementById("cart");
    cartDiv.innerHTML = "";

    let total = 0;

    cart.forEach(item => {
        total += prices[item];
        cartDiv.innerHTML += `<div>${item} - ${prices[item]}€</div>`;
    });

    document.getElementById("total").innerText = "Total : " + total + "€";
}

async function checkout() {
    if (cart.length === 0) return alert("Panier vide");

    const res = await fetch("http://localhost:3000/create-checkout-session", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            cart,
            userEmail: "user@test.com"
        })
    });

    const data = await res.json();

    if (data.url) {
        window.location.href = data.url;
    }
}
</script>

</body>
</html>
