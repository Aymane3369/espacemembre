<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Packs + Panier</title>

<style>
body {
    font-family: Arial;
    background:#f4f6fb;
    padding:20px;
}

.container {
    max-width:900px;
    margin:auto;
    background:#fff;
    padding:20px;
    border-radius:12px;
}

.pack {
    display:flex;
    justify-content:space-between;
    padding:12px;
    border:1px solid #ddd;
    margin-bottom:10px;
    border-radius:8px;
}

button {
    background:#0f1a2e;
    color:#fff;
    border:none;
    padding:8px 12px;
    border-radius:6px;
    cursor:pointer;
}

button:hover { background:#1a2c4a; }

.cart {
    margin-top:20px;
    border-top:2px solid #eee;
    padding-top:10px;
}

.cart-item {
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:8px;
    background:#f4f6fb;
    margin-bottom:6px;
    border-radius:6px;
}

.total {
    font-weight:bold;
    margin-top:10px;
}

.btn-remove {
    background:transparent;
    border:none;
    color:#a04444;
    cursor:pointer;
    font-size:14px;
}

.btn-remove:hover {
    transform:scale(1.2);
    color:red;
}
</style>

</head>

<body>

<div class="container">

<h2>🛒 Packs</h2>

<div class="pack">
    <span>🥉 Bronze - 10€</span>
    <button onclick="addToCart('bronze')">Ajouter</button>
</div>

<div class="pack">
    <span>🥈 Silver - 20€</span>
    <button onclick="addToCart('silver')">Ajouter</button>
</div>

<div class="pack">
    <span>🥇 Gold - 30€</span>
    <button onclick="addToCart('gold')">Ajouter</button>
</div>

<div class="cart">

<h3>Panier</h3>

<div id="cart"></div>

<div class="total" id="total">Total : 0€</div>

<button onclick="checkout()">💳 Payer Stripe</button>

</div>

</div>

<script>
// -------------------- DATA --------------------
const prices = {
    bronze: 10,
    silver: 20,
    gold: 30
};

let cart = [];

// -------------------- ADD --------------------
function addToCart(item) {
    if (!cart.includes(item)) {
        cart.push(item);
        render();
    }
}

// -------------------- REMOVE --------------------
function removeFromCart(item) {
    cart = cart.filter(t => t !== item);
    render();
}

// -------------------- RENDER --------------------
function render() {
    const cartDiv = document.getElementById("cart");
    cartDiv.innerHTML = "";

    let total = 0;

    cart.forEach(item => {
        total += prices[item];

        cartDiv.innerHTML += `
            <div class="cart-item">
                <span>${item} - ${prices[item]}€</span>
                <button class="btn-remove" onclick="removeFromCart('${item}')">❌</button>
            </div>
        `;
    });

    document.getElementById("total").innerText = "Total : " + total + "€";
}

// -------------------- STRIPE CHECKOUT --------------------
async function checkout() {
    if (cart.length === 0) {
        alert("Panier vide");
        return;
    }

    // 👉 backend requis
    const res = await fetch("http://localhost:3000/create-checkout-session", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            cart,
            userEmail: "test@test.com"
        })
    });

    const data = await res.json();

    if (data.url) {
        window.location.href = data.url;
    } else {
        alert("Erreur Stripe");
    }
}

// init
render();
</script>

</body>
</html>
